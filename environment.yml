name: flow
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.1.0
  - torchvision=0.16.0
  - pytorch-cuda=12.1
  - numpy
  - scipy
  - matplotlib
  - pip
  - pip:
    - opencv-python>=4.8.0
    - Pillow>=10.0.0
    - timm>=0.9.0
    - einops>=0.6.0
    - loguru>=0.7.0
    - scikit-image>=0.21.0
    - gdown>=4.7.0
